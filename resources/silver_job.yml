resources:
  jobs:
    Turbine_03_Silver:
      name: Turbine_03_Silver
      schedule:
        quartz_cron_expression: 0 */2 * * * ?
        timezone_id: Europe/Minsk
        pause_status: PAUSED
      tasks:
        - task_key: Silver_ingestion
          notebook_task:
            notebook_path: ../src/03_silver.py
            source: WORKSPACE
          max_retries: 1
          min_retry_interval_millis: 0
          disable_auto_optimization: false
      tags:
        project: turbines
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED